<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFRIN RAGIL HARDADI - Social Links</title>
  
  <!-- Material Symbols & Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    :root {
      /* Material 3 Expressive Palette (Deep Sapphire & Rose) */
      --md-sys-color-background: #0f1318;
      --md-sys-color-surface: #181c22;
      --md-sys-color-surface-variant: #22272f;
      --md-sys-color-primary: #a8c7fa;
      --md-sys-color-on-primary: #062e6f;
      --md-sys-color-secondary: #c2e7ff;
      --md-sys-color-on-surface: #e2e2e2;
      --md-sys-color-on-surface-variant: #c4c7c5;
      --md-sys-color-outline: #8e918f;
      
      /* Shape & Motion */
      --md-shape-corner-extra-large: 28px;
      --md-shape-corner-full: 9999px;
      --transition-expressive: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* Main Expressive Card Container */
    .container {
      background-color: var(--md-sys-color-surface);
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2rem;
      border-radius: var(--md-shape-corner-extra-large);
      box-shadow: 0px 4px 30px rgba(0, 0, 0, 0.4);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Header Profile Layout */
    .profile-header {
      margin-bottom: 2rem;
    }

    /* Expressive Avatar Shape */
    .avatar-placeholder {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #a8c7fa, #d2e3fc);
      border-radius: 32px; /* Material 3 squircle feel */
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-sys-color-on-primary);
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Space Grotesk', sans-serif;
      box-shadow: 0 8px 16px rgba(168, 199, 250, 0.2);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    /* Material 3 Card List for Links */
    .social-media-links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .social-media-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
      text-decoration: none;
      border-radius: 16px;
      font-weight: 500;
      font-size: 1rem;
      transition: var(--transition-expressive);
      border: 1px solid transparent;
    }

    /* Interactive States */
    .social-media-links a:hover {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 4px 12px rgba(168, 199, 250, 0.3);
    }

    .social-media-links a:active {
      transform: translateY(0) scale(0.98);
    }

    .link-text {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* About Section Container */
    .about {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.25rem;
      border-radius: 20px;
      text-align: left;
    }

    .about h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: var(--md-sys-color-secondary);
      margin-bottom: 0.25rem;
    }

    .about p {
      font-size: 0.95rem;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Profile Area -->
    <div class="profile-header">
      <div class="avatar-placeholder">AR</div>
      <h1>AFRIN RAGIL HARDADI</h1>
      <div class="subtitle">Social Connections</div>
    </div>

    <!-- Expressive Material Links -->
    <div class="social-media-links">
      <a href="https://www.facebook.com/afrin.ragil/" target="_blank">
        <span class="link-text">Facebook</span>
        <span class="material-symbols-rounded">arrow_forward</span>
      </a>
      <a href="https://www.instagram.com/hyrrr_r/" target="_blank">
        <span class="link-text">Instagram</span>
        <span class="material-symbols-rounded">arrow_forward</span>
      </a>
      <a href="https://youtube.com/@Hyrrr_r" target="_blank">
        <span class="link-text">YouTube</span>
        <span class="material-symbols-rounded">arrow_forward</span>
      </a>
    </div>

    <!-- About Block -->
    <div class="about">
      <h3>About Me</h3>
      <p>Just an average person.</p>
    </div>
  </div>

</body>
</html>
